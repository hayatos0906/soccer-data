<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Soccer Tracking Dashboard</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; }
        .dashboard { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .controls { display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 16px; }
        .control-group { display: flex; flex-direction: column; gap: 4px; }
        .control-group label { font-size: 12px; color: #666; font-weight: bold; }
        .control-group input { width: 110px; padding: 7px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { padding: 9px 18px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        button:hover { background-color: #0056b3; }
        #pitchCanvas { background-color: #4CAF50; border: 2px solid #333; display: block; margin: 0 auto; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h2>⚽️ データ可視化</h2>
        <div class="controls">
            <div class="control-group">
                <label>試合 ID</label>
                <input id="gameIdInput" type="number" value="2" min="1">
            </div>
            <div class="control-group">
                <label>開始フレーム</label>
                <input id="frameStartInput" type="number" value="17100" min="1">
            </div>
            <div class="control-group">
                <label>終了フレーム</label>
                <input id="frameEndInput" type="number" value="17400" min="1">
            </div>
            <button id="fetchDataBtn">描画</button>
        </div>
        <!-- canvas の高さは app.js がピッチ縦幅 × スケールで自動計算する -->
        <canvas id="pitchCanvas" width="1050" height="680"></canvas>
    </div>

    <script src="app.js"></script>
</body>
</html>
